name: Versioneer Automated Scraper

on:
  schedule:
    # Runs at minute 0 past every 6th hour (e.g., midnight, 6am, noon, 6pm)
    - cron: '0 */6 * * *'
  
  # This is crucial: it adds a button in the GitHub UI so you can manually trigger a run for testing
  workflow_dispatch: 

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment so runs don't overwrite each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Scraper Engine
        run: node build.js

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells the action to only upload our generated output folder
          path: './public' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scrape-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4